# Continuous Integration – runs on every push and pull request.
# Checks: lint (ruff), formatting (black --check), type hints (mypy), syntax.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
          # Install package deps (needed for mypy)
          pip install -r requirements.txt -e . || true

      - name: Ruff lint
        run: ruff check wikimolgen/ web/

      - name: Black formatting check
        run: black --check wikimolgen/ web/

      - name: Mypy type check
        run: mypy wikimolgen/ --ignore-missing-imports
        continue-on-error: true   # Advisory – won't block PRs until stubs are complete

      - name: Syntax check all Python files
        run: find . -name '*.py' -not -path './.git/*' | xargs python -m py_compile
