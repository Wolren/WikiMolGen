# Publishes WikiMolGen to PyPI via OIDC Trusted Publishing.
# Trigger: push of a version tag (v*.*.*) OR manual workflow_dispatch.
#
# Setup required (one-time):
#   1. Go to https://pypi.org → Account → Publishing → Add a new pending publisher
#      - PyPI project name : WikiMolGen
#      - GitHub owner      : Wolren
#      - GitHub repo       : WikiMolGen
#      - Workflow filename : python-publish.yml
#      - Environment name  : pypi
#   2. Create a GitHub environment named "pypi" (repo Settings → Environments).
#      Optionally add a required-reviewer protection rule there.

name: Publish Python Package

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip PyPI upload)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # 1. Build sdist + wheel
  # ─────────────────────────────────────────────
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so setuptools-scm can read tags (if used later)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Sync the version in pyproject.toml to the pushed tag (e.g. v0.2.1 → 0.2.1).
      # This is a no-op on manual workflow_dispatch runs that carry no tag.
      - name: Patch version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.2.1
          VERSION="${TAG#v}"                 # strip leading 'v'
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          echo "Building version ${VERSION}"

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check --strict dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # 2. Publish to PyPI (OIDC – no API token needed)
  # ─────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # Skip upload on dry-run
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')

    permissions:
      id-token: write   # required for OIDC Trusted Publishing

    environment:
      name: pypi
      url: https://pypi.org/project/WikiMolGen/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
